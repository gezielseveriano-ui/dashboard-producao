<script>
// --- A ÚNICA MUDANÇA É AQUI EM BAIXO ---
// Substitua o evento de 'change' do fileInput por esta função que lê do GitHub:

async function carregarDadosDoGitHub() {
    setStatus('Lendo dados do servidor...');
    try {
        const res = await fetch('dados.xlsx');
        if (!res.ok) throw new Error('Não encontrei o arquivo dados.xlsx');
        const buf = await res.arrayBuffer();
        const wb = XLSX.read(buf, {type: 'array', cellDates: true});
        
        // Aqui chamamos a sua função original de processar tudo
        processarPlanilha(wb);
    } catch (err) {
        setStatus('Erro: ' + err.message);
    }
}

// Chame a função automaticamente ao abrir o site:
window.addEventListener('DOMContentLoaded', carregarDadosDoGitHub);
