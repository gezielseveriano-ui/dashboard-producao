<script>
async function carregar() {
    const res = await fetch('dados.xlsx');
    const buf = await res.arrayBuffer();
    const wb = XLSX.read(buf, {type: 'array'});
    const data = XLSX.utils.sheet_to_json(wb.Sheets['MICRO']);
    
    // Isto vai listar no console (F12) o que o site está a ler
    console.log("Dados lidos:", data);
    
    if (data.length > 0) {
        // Mostra o nome das colunas que ele encontrou
        alert("Colunas encontradas: " + Object.keys(data[0]).join(", "));
    }
}
carregar();
</script>
