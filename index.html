<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Controle de Produção</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7fc; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .val { font-size: 24px; font-weight: bold; color: #2a5298; }
    </style>
</head>
<body>
    <h1>Painel de Produção</h1>
    <div id="status">Carregando dados do GitHub...</div>
    <div id="app"></div>

    <script>
        async function init() {
            try {
                const res = await fetch('dados.xlsx');
                const buf = await res.arrayBuffer();
                const wb = XLSX.read(buf, {type: 'array'});
                const data = XLSX.utils.sheet_to_json(wb.Sheets['MICRO']);
                
                // Calcular totais
                let totPeso = data.reduce((s, r) => s + (parseFloat(r.Peso) || 0), 0);
                
                document.getElementById('status').innerHTML = "Dados carregados com sucesso!";
                document.getElementById('app').innerHTML = `
                    <div class="grid">
                        <div class="card">
                            <div>Total Produzido</div>
                            <div class="val">${totPeso.toLocaleString('pt-BR', {minimumFractionDigits:2})} kg</div>
                        </div>
                    </div>
                `;
                // Aqui você pode adicionar as chamadas das funções de gráficos que você já tinha
            } catch (e) {
                document.getElementById('status').innerHTML = "Erro: " + e.message;
            }
        }
        init();
    </script>
</body>
</html>
