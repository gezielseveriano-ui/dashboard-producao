// --- LEITURA AUTOMÁTICA DO GITHUB ---
async function carregarDadosDoGitHub() {
  setStatus('Baixando dados do GitHub...');
  try {
    const res = await fetch('dados.xlsx');
    if (!res.ok) throw new Error('dados.xlsx não encontrado.');
    const buf = await res.arrayBuffer();
    const wb = XLSX.read(buf, {type: 'array', cellDates: true});
    processarPlanilha(wb);
  } catch (err) {
    document.getElementById('mainContent').innerHTML = `<div class="empty">Erro: ${err.message}</div>`;
  }
}

// --- TODA A SUA LÓGICA DE PROCESSAMENTO ORIGINAL ---
