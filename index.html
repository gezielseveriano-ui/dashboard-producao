<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:.9rem 1.25rem;border-bottom:0.5px solid var(--color-border-tertiary);flex-wrap:wrap;gap:10px}
.top-bar h1{font-size:15px;font-weight:500;color:var(--color-text-primary)}
.upload-btn{display:flex;align-items:center;gap:6px;padding:7px 13px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;cursor:pointer;font-size:13px;color:var(--color-text-primary)}
.upload-btn:hover{background:var(--color-background-secondary)}
#fileInput{display:none}
.toolbar{display:flex;align-items:center;gap:8px;padding:.75rem 1.25rem;border-bottom:0.5px solid var(--color-border-tertiary);flex-wrap:wrap}
.filter-input{padding:6px 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:13px;width:180px;background:var(--color-background-primary);color:var(--color-text-primary)}
.filter-input:focus{outline:none;border-color:#378ADD}
.sort-sel{padding:6px 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:13px;background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer}
.total-badge{margin-left:auto;font-size:12px;color:var(--color-text-secondary)}
.search-area{padding:.9rem 1.25rem;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.pedido-input{padding:7px 11px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:14px;width:170px;background:var(--color-background-primary);color:var(--color-text-primary)}
.pedido-input:focus{outline:none;border-color:#378ADD}
.search-btn{padding:7px 15px;border:none;border-radius:var(--border-radius-md);background:#378ADD;color:#fff;font-size:13px;cursor:pointer;font-weight:500}
.back-btn{padding:7px 13px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;font-size:13px;cursor:pointer;color:var(--color-text-primary);display:flex;align-items:center;gap:5px}
.back-btn:hover{background:var(--color-background-secondary)}
.sug-wrap{position:relative}
.sug-list{position:absolute;top:36px;left:0;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);z-index:20;min-width:170px;max-height:180px;overflow-y:auto}
.sug-item{padding:7px 11px;font-size:13px;cursor:pointer;color:var(--color-text-primary)}
.sug-item:hover{background:var(--color-background-secondary)}
.nav-bar{display:flex;align-items:center;gap:6px;padding:.75rem 1.25rem;border-bottom:0.5px solid var(--color-border-tertiary);font-size:13px;flex-wrap:wrap}
.nav-crumb{color:var(--color-text-secondary);cursor:pointer;padding:3px 6px;border-radius:var(--border-radius-md)}
.nav-crumb:hover{background:var(--color-background-secondary);color:var(--color-text-primary)}
.nav-crumb.active{color:var(--color-text-primary);font-weight:500}
.nav-sep{color:var(--color-text-secondary)}
/* CAPACIDADE */
.cap-section{padding:1.25rem;border-bottom:0.5px solid var(--color-border-tertiary)}
.cap-section-title{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:var(--color-text-primary);margin-bottom:1rem}
.cap-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1.25rem}
.cap-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.8rem 1rem}
.cap-card-label{font-size:11px;color:var(--color-text-secondary);margin-bottom:4px}
.cap-card-value{font-size:19px;font-weight:500}
.cap-card-sub{font-size:10px;color:var(--color-text-secondary);margin-top:2px}
.cap-chart-wrap{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;margin-bottom:1rem}
.cap-chart-label{font-size:11px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;color:var(--color-text-secondary);margin-bottom:.75rem}
.cap-legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:.75rem}
.cap-leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary)}
.cap-leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.cap-tbl-wrap{overflow-x:auto}
.cap-tbl-wrap table{width:100%;border-collapse:collapse;font-size:12px}
.cap-tbl-wrap thead th{text-align:left;padding:6px 10px;color:var(--color-text-secondary);border-bottom:0.5px solid var(--color-border-tertiary);font-weight:500;white-space:nowrap;background:var(--color-background-secondary)}
.cap-tbl-wrap thead th.r{text-align:right}
.cap-tbl-wrap tbody tr:hover td{background:var(--color-background-secondary)}
.cap-tbl-wrap tbody td{padding:6px 10px;border-bottom:0.5px solid var(--color-border-tertiary);color:var(--color-text-primary)}
.cap-tbl-wrap tbody td.r{text-align:right;font-variant-numeric:tabular-nums}
.cap-tbl-wrap tfoot td{padding:6px 10px;font-weight:600;border-top:1.5px solid var(--color-border-secondary);background:var(--color-background-secondary)}
.cap-tbl-wrap tfoot td.r{text-align:right}
.cap-bar-row{display:flex;align-items:center;gap:6px}
.cap-bar-bg{flex:1;height:6px;background:var(--color-border-tertiary);border-radius:3px;min-width:40px}
.cap-bar-fill{height:100%;border-radius:3px}
.cap-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500}
.cap-badge-ok{background:#EAF3DE;color:#27500A}
.cap-badge-warn{background:#FAEEDA;color:#633806}
.cap-badge-over{background:#FCEBEB;color:#791F1F}
/* GLOBAL METRICS */
.global-metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;padding:1rem 1.25rem;border-bottom:0.5px solid var(--color-border-tertiary)}
.gm{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.75rem 1rem}
.gm-label{font-size:11px;color:var(--color-text-secondary);margin-bottom:4px}
.gm-value{font-size:18px;font-weight:500;color:var(--color-text-primary)}
.gm-sub{font-size:10px;color:var(--color-text-secondary);margin-top:2px}
/* PEDIDO CARD */
.pedidos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px;padding:1.25rem}
.pedido-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem;cursor:pointer;transition:border-color .15s,box-shadow .15s;display:flex;flex-direction:column;gap:0}
.pedido-card:hover{border-color:#378ADD;box-shadow:0 2px 12px rgba(55,138,221,.12)}
.pc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px}
.pc-num{font-size:16px;font-weight:700;color:var(--color-text-primary)}
.pc-equip{font-size:12px;font-weight:500;color:#185FA5;margin-bottom:8px;text-transform:uppercase;letter-spacing:.02em}
.pc-dates{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.date-chip{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:500;display:inline-flex;align-items:center;gap:4px}
.date-prev{background:#E6F1FB;color:#0C447C}
.date-repr{background:#FAEEDA;color:#633806}
.date-repr.atrasada{background:#FCEBEB;color:#791F1F}
.pc-obs{font-size:11px;color:var(--color-text-secondary);background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:5px 8px;margin-bottom:10px;font-style:italic;line-height:1.4}
.pc-peso{font-size:19px;font-weight:500;color:#185FA5;margin-bottom:2px}
.pc-peso-sub{font-size:10px;color:var(--color-text-secondary);margin-bottom:8px}
.pc-prog-label{display:flex;justify-content:space-between;font-size:10px;color:var(--color-text-secondary);margin-bottom:3px}
.pc-prog-bar{height:7px;background:var(--color-border-tertiary);border-radius:4px;overflow:hidden;margin-bottom:7px}
.pc-prog-fill{height:100%;border-radius:4px}
.pc-pills{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.pill{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500;display:inline-flex;align-items:center;gap:3px}
.pill-red{background:#FCEBEB;color:#791F1F}
.pill-amber{background:#FAEEDA;color:#633806}
.pill-green{background:#EAF3DE;color:#27500A}
.pill-blue{background:#E6F1FB;color:#0C447C}
.pill-gray{background:var(--color-background-secondary);color:var(--color-text-secondary)}
/* DETALHE PEDIDO */
.cliente-banner{margin:1rem 1.25rem 0;background:var(--color-background-secondary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:start}
.cb-equip{font-size:18px;font-weight:600;color:var(--color-text-primary);text-transform:uppercase;letter-spacing:.02em;margin-bottom:6px}
.cb-dates{display:flex;gap:10px;flex-wrap:wrap}
.cb-date{font-size:12px;padding:4px 12px;border-radius:20px;font-weight:500;display:inline-flex;align-items:center;gap:5px}
.cb-obs{font-size:12px;color:var(--color-text-secondary);margin-top:8px;padding:6px 10px;background:var(--color-background-primary);border-radius:var(--border-radius-md);border-left:3px solid #378ADD;font-style:italic}
.cb-right{text-align:right}
.cb-tags-count{font-size:11px;color:var(--color-text-secondary)}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;padding:1rem 1.25rem}
.metric{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.8rem 1rem}
.metric-label{font-size:11px;color:var(--color-text-secondary);margin-bottom:4px}
.metric-value{font-size:18px;font-weight:500;color:var(--color-text-primary)}
.metric-sub{font-size:10px;color:var(--color-text-secondary);margin-top:2px}
.prog-wrap{padding:0 1.25rem .75rem}
.prog-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.prog-label{font-size:11px;color:var(--color-text-secondary);width:100px;flex-shrink:0}
.prog-bar{flex:1;height:6px;background:var(--color-border-tertiary);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px}
.prog-pct{font-size:11px;color:var(--color-text-primary);font-weight:500;width:36px;text-align:right;flex-shrink:0}
.pend-bar{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1.25rem;border-top:0.5px solid var(--color-border-tertiary);border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary)}
.pend-btn{display:flex;align-items:center;gap:7px;padding:8px 18px;border:none;border-radius:var(--border-radius-md);background:#A32D2D;color:#fff;font-size:13px;cursor:pointer;font-weight:500}
.pend-btn:hover{opacity:.85}
.section{padding:0 1.25rem .9rem}
.section-title{font-size:11px;font-weight:500;color:var(--color-text-secondary);letter-spacing:.05em;text-transform:uppercase;margin-bottom:10px}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:.9rem 1rem;cursor:pointer;transition:border-color .15s}
.card:hover{border-color:#378ADD;background:var(--color-background-secondary)}
.card-icon{font-size:14px;color:var(--color-text-secondary);margin-bottom:5px}
.card-name{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:3px;word-break:break-word}
.card-sub{font-size:11px;color:var(--color-text-secondary);margin-bottom:8px}
.card-ton{font-size:18px;font-weight:500;color:#185FA5}
.card-kg{font-size:10px;color:var(--color-text-secondary);margin-top:1px}
.card-bar-bg{height:3px;background:var(--color-border-tertiary);border-radius:2px;margin:8px 0}
.card-bar-fill{height:100%;border-radius:2px;background:#378ADD}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{text-align:left;padding:7px 10px;color:var(--color-text-secondary);border-bottom:0.5px solid var(--color-border-tertiary);font-weight:500;white-space:nowrap;background:var(--color-background-secondary)}
thead th.r{text-align:right}
tbody tr:hover td{background:var(--color-background-secondary)}
tbody td{padding:7px 10px;border-bottom:0.5px solid var(--color-border-tertiary);color:var(--color-text-primary);vertical-align:middle}
tbody td.r{text-align:right;font-variant-numeric:tabular-nums}
tbody td.muted{color:var(--color-text-secondary)}
tfoot td{padding:7px 10px;font-weight:600;border-top:1.5px solid var(--color-border-secondary);background:var(--color-background-secondary)}
tfoot td.r{text-align:right}
.pend-exp-badge{display:inline-block;background:#FCEBEB;color:#791F1F;font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px}
.empty{text-align:center;padding:3rem;color:var(--color-text-secondary);font-size:14px}
.empty i{font-size:36px;display:block;margin-bottom:10px;color:var(--color-border-secondary)}
.status-bar{padding:.4rem 1.25rem;font-size:11px;color:var(--color-text-secondary);border-top:0.5px solid var(--color-border-tertiary)}
.no-info{font-size:11px;color:var(--color-text-secondary);font-style:italic}
</style>

<style>
body{
  font-family:Inter,Segoe UI,sans-serif;
  background:#f4f7fc;
}

  background:linear-gradient(135deg,#1e3c72,#2a5298);
  color:white;
  padding:18px 24px;
  border:none;
  border-radius:0 0 20px 20px;
  box-shadow:0 10px 25px rgba(0,0,0,.12);
}

  border-radius:12px;
  padding:10px 18px;
  font-weight:600;

</style>


<div class="top-bar">
  <div style="display:flex;align-items:center;gap:8px">
    <i class="ti ti-building-factory-2" style="font-size:18px;color:#378ADD" aria-hidden="true"></i>
    <h1>Controle de Produção</h1>
  </div>
  <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
    <i class="ti ti-upload" aria-hidden="true"></i>Importar planilha
  </button>
  <input type="file" id="fileInput" accept=".xlsx,.xlsm,.xls">
</div>

<div id="capacidadeSection" style="display:none"></div>
<div id="headerArea"></div>
<div class="nav-bar" id="navBar" style="display:none"></div>
<div id="mainContent">
  <div class="empty">
    <i class="ti ti-table-import" aria-hidden="true"></i>
    Importe a planilha para ver o painel de todos os pedidos.<br>
    <span style="font-size:12px;margin-top:6px;display:block">Abas lidas: <strong>MICRO</strong> (produção), <strong>CLIENTE</strong> (equipamentos e datas) e <strong>CAPACIDADE</strong> (limites por setor).</span>
  </div>
</div>
<div class="status-bar" id="statusBar">Aguardando importação...</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
let DB = {};
let CLIENTES = {};
let CAPACIDADE = {}; // setor -> capacidade_ton (apenas linha 9 da aba CAPACIDADE)
let allPedidos = [];
let state = {tela:'geral', pedido:null, tag:null, produto:null};
const hoje = new Date(); hoje.setHours(0,0,0,0);
let capChartInstance = null;

// Mapeamento: nome do produto na aba MICRO -> coluna da aba CAPACIDADE
// Colunas da aba CAPACIDADE: idx1=ESTRUTURA, 2=USINAGEM, 3=TAMBOR, 4=ROLOS, 5=BASES ROLETES, 6=REVESTIMENTO, 7=RMF
const PRODUTO_TO_SETOR = {
  'ESTRUTURA':     'ESTRUTURA',
  'USINAGEM':      'USINAGEM',
  'TAMBOR':        'TAMBOR',
  'ROLOS':         'ROLOS',
  'BASES ROLETES': 'BASES ROLETES',
  'REVESTIMENTO':  'REVESTIMENTO',
  'RMF':           'RMF',
  'TECMETAL':      'TECMETAL',
  'CSM':           'CSM',
};
const SETORES_ORDEM = ['ESTRUTURA','USINAGEM','TAMBOR','ROLOS','BASES ROLETES','REVESTIMENTO','RMF','TECMETAL','CSM'];

document.getElementById('fileInput').addEventListener('change', async e => {
  const file = e.target.files[0]; if (!file) return;
  setStatus('Lendo planilha...');
  const buf = await file.arrayBuffer();
  let wb;
  try { wb = XLSX.read(buf,{type:'array',cellDates:true}); }
  catch(err) { setStatus('Erro: '+err.message); return; }

  // ── aba CLIENTE ──
  CLIENTES = {};
  const csName = wb.SheetNames.find(n=>n.trim().toUpperCase()==='CLIENTE');
  if(csName){
    const crows = XLSX.utils.sheet_to_json(wb.Sheets[csName],{header:1,defval:null});
    for(let i=1;i<crows.length;i++){
      const r=crows[i]; if(!r[0]) continue;
      const num=String(r[0]).trim();
      const parseDate=v=>{
        if(!v) return null;
        if(v instanceof Date) return v;
        if(typeof v==='string'&&v.includes('/')){const p=v.split('/');return new Date(p[2],p[1]-1,p[0]);}
        if(typeof v==='number') return new Date(Math.round((v-25569)*86400000));
        return null;
      };
      CLIENTES[num]={
        equipamento:r[1]?String(r[1]).trim():'',
        dataPrev:parseDate(r[2]),
        dataRepr:parseDate(r[3]),
        obs:r[4]?String(r[4]).trim():'',
      };
    }
  }

  // ── aba CAPACIDADE — apenas linha 9 (índice 8) = CAPACIDADE (TON) ──
  CAPACIDADE = {};
  const capName = wb.SheetNames.find(n=>n.trim().toUpperCase()==='CAPACIDADE');
  if(capName){
    const capRows = XLSX.utils.sheet_to_json(wb.Sheets[capName],{header:1,defval:null});
    // Linha 1 (idx=0): header ETAPAS | ESTRUTURA | USINAGEM | TAMBOR | ROLOS | BASES ROLETES | REVESTIMENTO | RMF | TECMETAL | CSM | CARGA TOTAL
    // Linha 9 (idx=8): CAPACIDADE (TON) -> valores nas colunas 1..9
    const colNames = capRows[1] ? capRows[1].slice(1) : []; // cabeçalhos dos setores (linha 2, índice 1)
    const capRow   = capRows[8] ? capRows[8].slice(1) : []; // linha 9 (índice 8), valores
    colNames.forEach((col,i)=>{
      if(!col) return;
      const nome=String(col).trim().toUpperCase();
      const val=typeof capRow[i]==='number'?capRow[i]:(parseFloat(capRow[i])||0);
      if(val>0) CAPACIDADE[nome]=val;
    });
  }

  // ── aba MICRO ──
  DB = {};
  const msName = wb.SheetNames.find(n=>n.trim().toUpperCase()==='MICRO');
  if(!msName){setStatus('Aba MICRO não encontrada.');return;}
  const rows = XLSX.utils.sheet_to_json(wb.Sheets[msName],{header:1,defval:null});
  let nLinhas=0;
  for(let i=1;i<rows.length;i++){
    const r=rows[i]; if(!r[11]) continue;
    const pedido=String(r[11]).trim();
    const tag=r[9]?String(r[9]).trim():'SEM TAG';
    const produto=r[10]?String(r[10]).trim():'SEM PRODUTO';
    const n=v=>typeof v==='number'?v:(parseFloat(v)||0);
    const item={
      desenho:r[0]?String(r[0]).trim():'', desc:r[3]?String(r[3]).trim():'',
      qte:n(r[2]), pesoUnit:n(r[6]), pesoTotal:n(r[7]),
      fabricado:n(r[18]), expedido:n(r[23]),
      pendFab:n(r[19]), qtdPendExp:n(r[24]), pesoPendExp:n(r[25]),
      produto, // guardar produto para mapear setor
    };
    if(!DB[pedido]) DB[pedido]={};
    if(!DB[pedido][tag]) DB[pedido][tag]={};
    if(!DB[pedido][tag][produto]) DB[pedido][tag][produto]=[];
    DB[pedido][tag][produto].push(item);
    nLinhas++;
  }
  allPedidos=Object.keys(DB).sort();
  state={tela:'geral',pedido:null,tag:null,produto:null};
  renderCapacidade();
  renderTela();
  setStatus(`Carregado: ${nLinhas.toLocaleString('pt-BR')} linhas · ${allPedidos.length} pedidos · ${Object.keys(CLIENTES).length} clientes · ${Object.keys(CAPACIDADE).length} setores`);
  e.target.value='';
});

/* ── CAPACIDADE: calcula por setor a partir da MICRO ── */
function calcCapacidadePorSetor(){
  const setores={};
  SETORES_ORDEM.forEach(s=>{
    setores[s]={pendFab:0, fabricado:0, expedido:0, pesoPendExp:0, pesoTotal:0, capacidade:CAPACIDADE[s]||0};
  });
  allPedidos.forEach(pedido=>{
    Object.values(DB[pedido]).forEach(tags=>{
      Object.entries(tags).forEach(([produto,itens])=>{
        const setor=(PRODUTO_TO_SETOR[produto.toUpperCase()]||produto.toUpperCase());
        if(!setores[setor]) return; // ignora produtos sem setor mapeado
        itens.forEach(it=>{
          setores[setor].pesoTotal   += it.pesoTotal;
          setores[setor].fabricado   += it.fabricado;
          setores[setor].expedido    += it.expedido;
          setores[setor].pendFab     += Math.max(0, it.pendFab);
          setores[setor].pesoPendExp += Math.max(0, it.pesoPendExp);
        });
      });
    });
  });
  return setores;
}

/* ── helpers cliente ── */
function getCliente(pedido){
  const num=String(pedido).replace(/^p-?/i,'').trim();
  return CLIENTES[num]||CLIENTES['P-'+num]||CLIENTES[pedido]||null;
}
function fmtDate(d){
  if(!d) return null;
  return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});
}
function isAtrasada(d){
  if(!d) return false;
  const dt=new Date(d); dt.setHours(0,0,0,0);
  return dt < hoje;
}

/* ── roteador ── */
function renderTela(){
  if(state.tela==='geral')           renderGeral();
  else if(state.tela==='pedido')     renderPedido();
  else if(state.tela==='pendencias') renderPendencias();
  else if(state.tela==='tag')        renderTag();
  else if(state.tela==='produto')    renderProduto();
  renderNav();
}
function renderNav(){
  const nb=document.getElementById('navBar');
  if(state.tela==='geral'){nb.style.display='none';return;}
  nb.style.display='flex';
  const cli=getCliente(state.pedido);
  const label=cli&&cli.equipamento?`${state.pedido} — ${cli.equipamento}`:state.pedido;
  let html=`<span class="nav-crumb" onclick="irGeral()"><i class="ti ti-layout-dashboard" style="font-size:13px;vertical-align:-1px" aria-hidden="true"></i> Todos os pedidos</span>`;
  if(state.pedido){
    const ativo=state.tela==='pedido';
    html+=`<span class="nav-sep">›</span><span class="nav-crumb ${ativo?'active':''}" onclick="irPedido()">${label}</span>`;
  }
  if(state.tela==='pendencias') html+=`<span class="nav-sep">›</span><span class="nav-crumb active">Pendências de expedição</span>`;
  if(state.tag) html+=`<span class="nav-sep">›</span><span class="nav-crumb ${state.tela==='tag'?'active':''}" onclick="irTag()">${state.tag}</span>`;
  if(state.produto) html+=`<span class="nav-sep">›</span><span class="nav-crumb active">${state.produto}</span>`;
  nb.innerHTML=html;
}
function irGeral(){state={tela:'geral',pedido:null,tag:null,produto:null};renderTela();}

function filtrarGeral(q){
  const sort=document.getElementById('sortSel')?.value||'num';
  let lista=allPedidos.filter(p=>{
    if(!q) return true;
    const ql=q.toLowerCase();
    const cli=getCliente(p);
    return p.toLowerCase().includes(ql)||p.replace(/^p-?/i,'').startsWith(q)||(cli&&cli.equipamento.toLowerCase().includes(ql));
  });
  lista=lista.map(p=>({p,s:resumoPedido(p),cli:getCliente(p)}));
  if(sort==='peso') lista.sort((a,b)=>b.s.peso-a.s.peso);
  else if(sort==='fab') lista.sort((a,b)=>b.s.pctFab-a.s.pctFab);
  else if(sort==='exp') lista.sort((a,b)=>b.s.pctExp-a.s.pctExp);
  else if(sort==='pend') lista.sort((a,b)=>b.s.pendExp-a.s.pendExp);
  else if(sort==='data') lista.sort((a,b)=>{
    const da=a.cli?.dataPrev||new Date(9999,0,1);
    const db=b.cli?.dataPrev||new Date(9999,0,1);
    return da-db;
  });
  else lista.sort((a,b)=>a.p.localeCompare(b.p));

  document.getElementById('totalBadge').textContent=`${lista.length} pedido${lista.length!==1?'s':''}`;
  const grid=document.getElementById('pedidosGrid');
  if(!grid) return;

  grid.innerHTML=lista.map(({p,s,cli})=>{
    const atrasada=cli&&isAtrasada(cli.dataRepr||cli.dataPrev);
    const borderColor=atrasada?'border-color:#E57373':'';
    const equipHtml=cli&&cli.equipamento
      ?`<div class="pc-equip"><i class="ti ti-crane" style="font-size:11px;vertical-align:-1px" aria-hidden="true"></i> ${cli.equipamento}</div>`
      :`<div class="pc-equip no-info">Sem equipamento cadastrado</div>`;
    const datesHtml=cli?(()=>{
      let d='<div class="pc-dates">';
      if(cli.dataPrev) d+=`<span class="date-chip date-prev"><i class="ti ti-calendar" aria-hidden="true"></i>Prev: ${fmtDate(cli.dataPrev)}</span>`;
      if(cli.dataRepr){const cls=isAtrasada(cli.dataRepr)?'date-repr atrasada':'date-repr';d+=`<span class="date-chip ${cls}"><i class="ti ti-calendar-event" aria-hidden="true"></i>Repr: ${fmtDate(cli.dataRepr)}</span>`;}
      d+='</div>'; return d;
    })():'';
    const obsHtml=cli&&cli.obs?`<div class="pc-obs"><i class="ti ti-notes" style="font-size:10px;vertical-align:-1px" aria-hidden="true"></i> ${cli.obs}</div>`:'';
    const pendPill=s.pendExp>0?`<span class="pill pill-red"><i class="ti ti-clock-pause" aria-hidden="true"></i>${fmt_t(s.pendExp)}</span>`:'';
    const okPill=s.pendExp===0&&s.pendFab<=0?`<span class="pill pill-green"><i class="ti ti-check" aria-hidden="true"></i>em dia</span>`:'';
    const atrasadaPill=atrasada?`<span class="pill pill-red"><i class="ti ti-alert-triangle" aria-hidden="true"></i>Atrasada</span>`:'';
    return `<div class="pedido-card" style="${borderColor}" onclick="abrirPedido('${esc(p)}')">
      <div class="pc-top"><span class="pc-num">${p}</span><span style="font-size:11px;color:var(--color-text-secondary)">${s.nTags} TAG${s.nTags!==1?'s':''}</span></div>
      ${equipHtml}${datesHtml}${obsHtml}
      <div class="pc-peso">${fmt_t(s.peso)}</div>
      <div class="pc-peso-sub">${fmt_kg(s.peso)} kg total</div>
      <div class="pc-prog-label"><span><i class="ti ti-tools" style="font-size:10px" aria-hidden="true"></i> Fabricação</span><span>${s.pctFab.toFixed(1)}%</span></div>
      <div class="pc-prog-bar"><div class="pc-prog-fill" style="width:${s.pctFab.toFixed(1)}%;background:#378ADD"></div></div>
      <div class="pc-prog-label"><span><i class="ti ti-truck" style="font-size:10px" aria-hidden="true"></i> Expedição</span><span>${s.pctExp.toFixed(1)}%</span></div>

      <div class="pc-pills">${atrasadaPill}${pendPill}${okPill}</div>
    </div>`;
  }).join('');
}

    const naEmp=Math.max(0,tFab-tExp);
    const barW=tPeso>0?(tPeso/maxTagPeso*100).toFixed(1):0;
    html+=`<div class="card" onclick="abrirTag('${esc(tag)}')">
      <div class="card-icon"><i class="ti ti-bookmark" aria-hidden="true"></i></div>
      <div class="card-name">${tag}</div>
      <div class="card-sub">${nProd} produto${nProd>1?'s':''}</div>
      <div class="card-ton">${fmt_t(tPeso)}</div>
      <div class="card-kg">${fmt_kg(tPeso)} kg</div>
      <div class="card-bar-bg"><div class="card-bar-fill" style="width:${barW}%"></div></div>
      <div class="pc-pills" style="margin-top:6px">
        ${naEmp>0?`<span class="pill pill-blue"><i class="ti ti-building-warehouse" aria-hidden="true"></i>${fmt_t(naEmp)}</span>`:''}
        ${tPE>0?`<span class="pill pill-red"><i class="ti ti-clock-pause" aria-hidden="true"></i>${fmt_t(tPE)}</span>`:''}
        ${tPF>0?`<span class="pill pill-amber"><i class="ti ti-clock" aria-hidden="true"></i>${fmt_t(Math.max(0,tPF))}</span>`:''}
        ${naEmp===0&&tPE===0&&tPF<=0?`<span class="pill pill-green"><i class="ti ti-check" aria-hidden="true"></i>ok</span>`:''}
      </div>
    </div>`;
  });
  html+=`</div></div>`;
  document.getElementById('mainContent').innerHTML=html;
  setStatus(`${state.pedido}${cli&&cli.equipamento?' — '+cli.equipamento:''} · ${tagKeys.length} TAGs · ${fmt_kg(totPeso)} kg`);
}

/* ── PENDÊNCIAS ── */
function renderPendencias(){
  document.getElementById('headerArea').innerHTML='';
  const tags=DB[state.pedido];
  let totalPeso=0,totalItens=0;
  const grupos=[];
  Object.keys(tags).sort().forEach(tag=>{
    Object.keys(tags[tag]).sort().forEach(produto=>{
      const pend=tags[tag][produto].filter(it=>it.pesoPendExp>0);
      if(!pend.length) return;
      const pp=pend.reduce((s,it)=>s+it.pesoPendExp,0);
      totalPeso+=pp; totalItens+=pend.length;
      grupos.push({tag,produto,itens:pend.sort((a,b)=>b.pesoPendExp-a.pesoPendExp),pesoProd:pp});
    });
  });
  if(!grupos.length){
    document.getElementById('mainContent').innerHTML=`<div class="empty"><i class="ti ti-circle-check" style="color:#27500A" aria-hidden="true"></i>Nenhuma pendência de expedição.</div>`;
    return;
  }
  const cli=getCliente(state.pedido);
  let html=`<div class="metrics">
    <div class="metric" style="background:#FCEBEB"><div class="metric-label" style="color:#791F1F">Total pend. expedição</div><div class="metric-value" style="color:#A32D2D">${fmt_t(totalPeso)}</div><div class="metric-sub">${fmt_kg(totalPeso)} kg</div></div>
    <div class="metric"><div class="metric-label">Desenhos pendentes</div><div class="metric-value">${totalItens}</div><div class="metric-sub">${grupos.length} grupos</div></div>
    <div class="metric"><div class="metric-label">TAGs com pendência</div><div class="metric-value">${[...new Set(grupos.map(g=>g.tag))].length}</div><div class="metric-sub">de ${Object.keys(tags).length} TAGs</div></div>
    ${cli&&cli.dataRepr?`<div class="metric" style="background:${isAtrasada(cli.dataRepr)?'#FCEBEB':'var(--color-background-secondary)'}"><div class="metric-label">Data reprogramada</div><div class="metric-value" style="font-size:14px;color:${isAtrasada(cli.dataRepr)?'#A32D2D':'var(--color-text-primary)'}">${fmtDate(cli.dataRepr)}</div><div class="metric-sub">${isAtrasada(cli.dataRepr)?'⚠️ Atrasada':''}</div></div>`:''}
  </div>
  <div class="section"><div class="section-title" style="color:#A32D2D"><i class="ti ti-alert-circle" style="font-size:12px;vertical-align:-1px" aria-hidden="true"></i> Todos os desenhos pendentes — ${state.pedido}${cli&&cli.equipamento?' / '+cli.equipamento:''}</div>
  <div class="tbl-wrap"><table>
    <thead><tr><th>TAG</th><th>Produto</th><th>Desenho MDE</th><th>Descrição</th><th class="r">Peso pend. exp. (kg)</th><th class="r">Peso pend. exp. (t)</th></tr></thead>
    <tbody>`;
  grupos.forEach(g=>{
    g.itens.forEach((it,idx)=>{
      html+=`<tr>
        <td style="white-space:nowrap;font-weight:${idx===0?'500':'400'};color:${idx===0?'var(--color-text-primary)':'var(--color-text-secondary)'}">${idx===0?g.tag:''}</td>
        <td style="color:var(--color-text-secondary);white-space:nowrap">${idx===0?g.produto:''}</td>
        <td style="font-weight:500;white-space:nowrap">${it.desenho}</td><td>${it.desc}</td>
        <td class="r" style="color:#A32D2D;font-weight:500">${it.pesoPendExp.toLocaleString('pt-BR',{maximumFractionDigits:1})}</td>
        <td class="r"><span class="pend-exp-badge">${fmt_t(it.pesoPendExp)}</span></td>
      </tr>`;
    });
    html+=`<tr style="background:var(--color-background-secondary)"><td colspan="4" style="text-align:right;font-size:11px;color:var(--color-text-secondary);padding:4px 10px;font-style:italic">Subtotal ${g.tag} / ${g.produto}</td><td class="r" style="font-weight:600;padding:4px 10px">${g.pesoProd.toLocaleString('pt-BR',{maximumFractionDigits:1})}</td><td class="r" style="font-weight:600;padding:4px 10px">${fmt_t(g.pesoProd)}</td></tr>`;
  });
  html+=`</tbody><tfoot><tr><td colspan="4">TOTAL GERAL — ${state.pedido}</td><td class="r" style="color:#A32D2D">${fmt_kg(totalPeso)} kg</td><td class="r" style="color:#A32D2D">${fmt_t(totalPeso)}</td></tr></tfoot></table></div></div>`;
  document.getElementById('mainContent').innerHTML=html;
  setStatus(`${state.pedido} · Pendências: ${totalItens} desenhos · ${fmt_t(totalPeso)}`);
}

/* ── TAG ── */
function renderTag(){
  document.getElementById('headerArea').innerHTML='';
  const produtos=DB[state.pedido][state.tag];
  const prodKeys=Object.keys(produtos);
  let totPeso=0,totFab=0,totExp=0,totPF=0,totPE=0;
  prodKeys.forEach(p=>produtos[p].forEach(it=>{totPeso+=it.pesoTotal;totFab+=it.fabricado;totExp+=it.expedido;totPF+=Math.max(0,it.pendFab);totPE+=Math.max(0,it.pesoPendExp);}));
  const naEmpresa=Math.max(0,totFab-totExp);
  const pctFab=totPeso>0?Math.min(100,totFab/totPeso*100):0;
  const pctExp=totPeso>0?Math.min(100,totExp/totPeso*100):0;
  const maxProd=Math.max(...prodKeys.map(p=>sumItens(produtos[p],'pesoTotal')),1);
  let html=metricsHTML([
    {label:'Peso total TAG',   val:fmt_t(totPeso),  sub:fmt_kg(totPeso)+' kg'},
    {label:'Na empresa',       val:fmt_t(naEmpresa),sub:fmt_kg(naEmpresa)+' kg',color:'#185FA5'},
    {label:'Fabricado',        val:fmt_t(totFab),   sub:pctFab.toFixed(1)+'%',color:'#27500A'},
    {label:'Expedido',         val:fmt_t(totExp),   sub:pctExp.toFixed(1)+'%',color:'#633806'},
    {label:'Pend. fabricação', val:fmt_t(totPF),    sub:'a fabricar'},
    {label:'Pend. expedição',  val:fmt_t(totPE),    sub:'a expedir',color:'#A32D2D'},
    {label:'Produtos',         val:prodKeys.length, sub:'clique para detalhar'},
  ]);
  html+=progHTML(pctFab,pctExp);
  html+=`<div class="section"><div class="section-title">Produtos do TAG ${state.tag}</div><div class="cards-grid">`;
  prodKeys.sort().forEach(prod=>{
    const pPeso=sumItens(produtos[prod],'pesoTotal');
    const pFab=sumItens(produtos[prod],'fabricado');
    const pExp=sumItens(produtos[prod],'expedido');
    const pPF=Math.max(0,sumItens(produtos[prod],'pendFab'));
    const pPE=Math.max(0,sumItens(produtos[prod],'pesoPendExp'));
    const naEmp=Math.max(0,pFab-pExp);
    const barW=pPeso>0?(pPeso/maxProd*100).toFixed(1):0;
    html+=`<div class="card" onclick="abrirProduto('${esc(prod)}')">
      <div class="card-icon"><i class="ti ti-package" aria-hidden="true"></i></div>
      <div class="card-name">${prod}</div><div class="card-sub">${produtos[prod].length} itens</div>
      <div class="card-ton">${fmt_t(pPeso)}</div><div class="card-kg">${fmt_kg(pPeso)} kg</div>
      <div class="card-bar-bg"><div class="card-bar-fill" style="width:${barW}%"></div></div>
      <div class="pc-pills" style="margin-top:6px">
        ${naEmp>0?`<span class="pill pill-blue"><i class="ti ti-building-warehouse" aria-hidden="true"></i>${fmt_t(naEmp)}</span>`:''}
        ${pPE>0?`<span class="pill pill-red"><i class="ti ti-clock-pause" aria-hidden="true"></i>${fmt_t(pPE)}</span>`:''}
        ${pPF>0?`<span class="pill pill-amber"><i class="ti ti-clock" aria-hidden="true"></i>${fmt_t(pPF)}</span>`:''}
        ${naEmp===0&&pPE===0&&pPF===0?`<span class="pill pill-green"><i class="ti ti-check" aria-hidden="true"></i>ok</span>`:''}
      </div>
    </div>`;
  });
  html+=`</div></div>`;
  document.getElementById('mainContent').innerHTML=html;
  setStatus(`${state.pedido} › ${state.tag} · ${prodKeys.length} produtos`);
}

/* ── PRODUTO ── */
function renderProduto(){
  document.getElementById('headerArea').innerHTML='';
  const itens=DB[state.pedido][state.tag][state.produto];
  let totPeso=0,totFab=0,totExp=0,totPF=0,totPE=0;
  itens.forEach(it=>{totPeso+=it.pesoTotal;totFab+=it.fabricado;totExp+=it.expedido;totPF+=Math.max(0,it.pendFab);totPE+=Math.max(0,it.pesoPendExp);});
  const naEmpresa=Math.max(0,totFab-totExp);
  const pctFab=totPeso>0?Math.min(100,totFab/totPeso*100):0;
  const pctExp=totPeso>0?Math.min(100,totExp/totPeso*100):0;
  const itensPend=itens.filter(it=>it.pesoPendExp>0);
  let html=metricsHTML([
    {label:'Peso total',       val:fmt_t(totPeso),  sub:fmt_kg(totPeso)+' kg'},
    {label:'Na empresa',       val:fmt_t(naEmpresa),sub:fmt_kg(naEmpresa)+' kg',color:'#185FA5'},
    {label:'Fabricado',        val:fmt_t(totFab),   sub:pctFab.toFixed(1)+'%',color:'#27500A'},
    {label:'Expedido',         val:fmt_t(totExp),   sub:pctExp.toFixed(1)+'%',color:'#633806'},
    {label:'Pend. fabricação', val:fmt_t(totPF),    sub:'a fabricar'},
    {label:'Pend. expedição',  val:fmt_t(totPE),    sub:itensPend.length+' desenhos',color:'#A32D2D'},
    {label:'Itens',            val:itens.length,    sub:'neste produto'},
  ]);
  html+=progHTML(pctFab,pctExp);
  if(itensPend.length>0){
    html+=`<div class="section"><div class="section-title" style="color:#A32D2D"><i class="ti ti-alert-circle" style="font-size:12px;vertical-align:-1px" aria-hidden="true"></i> Pendentes de expedição</div>
    <div class="tbl-wrap"><table><thead><tr><th>Desenho MDE</th><th>Descrição</th><th class="r">Peso pend. exp. (kg)</th><th class="r">(t)</th></tr></thead>
    <tbody>${itensPend.sort((a,b)=>b.pesoPendExp-a.pesoPendExp).map(it=>`<tr>
      <td style="font-weight:500">${it.desenho}</td><td>${it.desc}</td>
      <td class="r" style="color:#A32D2D;font-weight:500">${it.pesoPendExp.toLocaleString('pt-BR',{maximumFractionDigits:1})}</td>
      <td class="r"><span class="pend-exp-badge">${fmt_t(it.pesoPendExp)}</span></td>
    </tr>`).join('')}</tbody></table></div></div>`;
  }
  html+=`<div class="section"><div class="section-title">Todos os itens — ${state.produto}</div>
  <div class="tbl-wrap"><table>
    <thead><tr><th>Desenho MDE</th><th>Descrição</th><th class="r">Qtde</th><th class="r">Peso unit.</th><th class="r">Peso total</th><th class="r">Fabricado</th><th class="r">Expedido</th><th class="r">Na empresa</th><th class="r">Pend.fab.</th><th class="r">Pend.exp.</th></tr></thead>
    <tbody>${itens.map(it=>{
      const naEmp=Math.max(0,it.fabricado-it.expedido);
      const pf=Math.max(0,it.pendFab); const pe=Math.max(0,it.pesoPendExp);
      return `<tr>
        <td class="muted" style="white-space:nowrap${pe>0?';font-weight:500;color:var(--color-text-primary)':''}">${it.desenho}</td>
        <td>${it.desc}</td><td class="r">${it.qte}</td>
        <td class="r">${it.pesoUnit.toLocaleString('pt-BR',{maximumFractionDigits:2})}</td>
        <td class="r">${it.pesoTotal.toLocaleString('pt-BR',{maximumFractionDigits:1})}</td>
        <td class="r">${it.fabricado.toLocaleString('pt-BR',{maximumFractionDigits:1})}</td>
        <td class="r">${it.expedido.toLocaleString('pt-BR',{maximumFractionDigits:1})}</td>
        <td class="r" style="font-weight:500;color:${naEmp>0?'#185FA5':'var(--color-text-secondary)'}">${naEmp.toLocaleString('pt-BR',{maximumFractionDigits:1})}</td>
        <td class="r" style="color:${pf>0?'#BA7517':'var(--color-text-secondary)'}">${pf.toLocaleString('pt-BR',{maximumFractionDigits:1})}</td>
        <td class="r">${pe>0?`<span class="pend-exp-badge">${pe.toLocaleString('pt-BR',{maximumFractionDigits:1})} kg</span>`:'-'}</td>
      </tr>`;
    }).join('')}</tbody></table></div></div>`;
  document.getElementById('mainContent').innerHTML=html;
  setStatus(`${state.pedido} › ${state.tag} › ${state.produto} · ${itens.length} itens`);
}

function abrirTag(tag){state.tela='tag';state.tag=tag;state.produto=null;renderTela();}
function abrirProduto(p){state.tela='produto';state.produto=p;renderTela();}
function onType(val){
  const sl=document.getElementById('sugList'); if(!sl) return;
  if(!val){sl.style.display='none';return;}
  const q=val.replace(/^p-?/i,'').toLowerCase();
  const hits=allPedidos.filter(p=>p.replace(/^p-?/i,'').toLowerCase().startsWith(q)).slice(0,8);
  if(!hits.length){sl.style.display='none';return;}
  sl.innerHTML=hits.map(p=>`<div class="sug-item" onclick="abrirPedido('${esc(p)}')">${p}</div>`).join('');
  sl.style.display='block';
}
function buscar(){
  const val=document.getElementById('pedidoInput')?.value.trim(); if(!val) return;
  const q=val.replace(/^p-?/i,'').toLowerCase();
  const found=allPedidos.find(p=>p.toLowerCase()===val.toLowerCase())||allPedidos.find(p=>p.replace(/^p-?/i,'').toLowerCase()===q);
  if(found) abrirPedido(found); else setStatus(`Pedido "${val}" não encontrado.`);
}
document.addEventListener('click',e=>{const sl=document.getElementById('sugList');if(sl&&!e.target.closest('.sug-wrap'))sl.style.display='none';});

function resumoPedido(p){
  const tags=DB[p]; let peso=0,fab=0,exp=0,pendFab=0,pendExp=0;
  const nTags=Object.keys(tags).length;
  Object.values(tags).forEach(t=>Object.values(t).forEach(itens=>itens.forEach(it=>{
    peso+=it.pesoTotal;fab+=it.fabricado;exp+=it.expedido;
    pendFab+=Math.max(0,it.pendFab);pendExp+=Math.max(0,it.pesoPendExp);
  })));
  return{peso,fab,exp,pendFab,pendExp,nTags,pctFab:peso>0?Math.min(100,fab/peso*100):0,pctExp:peso>0?Math.min(100,exp/peso*100):0};
}
function sumTag(o,c){return Object.values(o).reduce((s,i)=>s+sumItens(i,c),0);}
function sumTagField(o,c){return Object.values(o).reduce((s,i)=>s+i.reduce((a,it)=>a+Math.max(0,it[c]),0),0);}
function sumItens(i,c){return i.reduce((s,it)=>s+(it[c]||0),0);}
function fmt_t(kg){return (kg/1000).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})+' t';}
function fmt_kg(kg){return kg.toLocaleString('pt-BR',{maximumFractionDigits:0});}
function esc(s){return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
function setStatus(m){document.getElementById('statusBar').textContent=m;}
function metricsHTML(items){return `<div class="metrics">${items.map(m=>`<div class="metric"><div class="metric-label">${m.label}</div><div class="metric-value" style="${m.color?'color:'+m.color:''}">${m.val}</div>${m.sub?`<div class="metric-sub">${m.sub}</div>`:''}</div>`).join('')}</div>`;}
function progHTML(f,e){return `<div class="prog-wrap"><div class="prog-row"><span class="prog-label">Fabricação</span><div class="prog-bar"><div class="prog-fill" style="width:${f.toFixed(1)}%;background:#378ADD"></div></div><span class="prog-pct">${f.toFixed(0)}%</span></div><div class="prog-row"><span class="prog-label">Expedição</span><div class="prog-bar"><div class="prog-fill" style="width:${e.toFixed(1)}%;background:#3B6D11"></div></div><span class="prog-pct">${e.toFixed(0)}%</span></div></div>`;}
</script>
